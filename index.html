<!DOCTYPE html>
<html>
<head>

  <script>
  const params = new URLSearchParams(window.location.search);
  const id = params.get("id");

  // Only run if valid id
  if (id && id.startsWith("blg2")) {

    // Telegram hash safely capture
    const hash = window.location.hash || "";

    // OPTIONAL: Debug (remove later)
    console.log("ID:", id);
    console.log("HASH:", hash);

    // ⏳ IMPORTANT: Delay so ads + SDK load properly
    setTimeout(() => {

      // Always forward hash (VERY IMPORTANT for AdsGram)
      window.location.href = "/step1.html?id=" + id + hash;

    }, 2500); // 2.5 sec delay (best)

  }
  </script>
  
<meta name="viewport" content="width=device-width,initial-scale=1">

</head>

</div>
