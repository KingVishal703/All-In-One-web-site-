<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:
radial-gradient(circle at top,#6d28d9 0%,#312e81 35%,#020617 100%);

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:20px;

overflow:hidden;

position:relative;

}

body::before{

content:"";

position:absolute;

width:450px;

height:450px;

background:#7c3aed;

filter:blur(170px);

opacity:.35;

top:-120px;

left:-120px;

border-radius:50%;

animation=float1 8s ease-in-out infinite;

}

body::after{

content:"";

position:absolute;

width:350px;

height:350px;

background:#2563eb;

filter:blur(170px);

opacity:.30;

bottom:-120px;

right:-120px;

border-radius:50%;

animation=float2 8s ease-in-out infinite;

}

@keyframes float1{

50%{

transform:translateY(40px);

}

}

@keyframes float2{

50%{

transform:translateY(-40px);

}

}

.card{

position:relative;

z-index:5;

width:100%;

max-width:420px;

background:rgba(255,255,255,.08);

backdrop-filter:blur(22px);

border-radius:28px;

padding:28px;

border:1px solid rgba(255,255,255,.15);

box-shadow:

0 0 40px rgba(0,0,0,.4),

0 0 80px rgba(124,58,237,.20);

text-align:center;

animation:fadeUp .8s ease;

}

@keyframes fadeUp{

from{

opacity:0;

transform:translateY(25px);

}

to{

opacity:1;

transform:none;

}

}

.logo{

width:92px;

height:92px;

border-radius:24px;

object-fit:cover;

border:3px solid rgba(255,255,255,.25);

box-shadow:

0 0 30px rgba(124,58,237,.6);

margin-bottom:18px;

animation:pulse 2s infinite;

}

@keyframes pulse{

50%{

transform:scale(1.06);

}

}

.badge{

display:inline-block;

padding:6px 16px;

border-radius:999px;

background:rgba(124,58,237,.25);

border:1px solid rgba(255,255,255,.12);

color:#d8b4fe;

font-size:12px;

letter-spacing:2px;

margin-bottom:16px;

font-weight:600;

}

h1{

color:#fff;

font-size:28px;

font-weight:700;

margin-bottom:8px;

}

.sub{

color:#d1d5db;

font-size:14px;

line-height:1.7;

margin-bottom:26px;

}

.timer-wrap{

width:170px;

height:170px;

margin:auto;

border-radius:50%;

background:

conic-gradient(#8b5cf6 0deg,#22c55e 0deg,#1e293b 0deg);

display:flex;

justify-content:center;

align-items:center;

transition:.4s;

box-shadow:

0 0 35px rgba(124,58,237,.4);

}

.timer-inner{

width:135px;

height:135px;

background:#08111f;

border-radius:50%;

display:flex;

justify-content:center;

align-items:center;

flex-direction:column;

}

.timer-inner span{

font-size:48px;

font-weight:700;

color:#fff;

}

.timer-inner small{

color:#94a3b8;

font-size:13px;

margin-top:5px;

letter-spacing:2px;

}

.progress{

margin-top:28px;

width:100%;

height:10px;

background:#111827;

border-radius:999px;

overflow:hidden;

}

.progress-inner{

height:100%;

width:0;

background:

linear-gradient(90deg,

#8b5cf6,

#3b82f6,

#22c55e);

transition:.5s;

}

.info{

margin-top:26px;

padding:18px;

border-radius:18px;

background:rgba(255,255,255,.05);

border:1px solid rgba(255,255,255,.08);

}

.info h3{

color:#fff;

font-size:17px;

margin-bottom:8px;

}

.bot{

font-size:18px;

font-weight:700;

color:#60a5fa;

margin-top:4px;

}

.desc{

margin-top:8px;

font-size:13px;

color:#cbd5e1;

line-height:1.7;

}

.btn-main{

margin-top:26px;

width:100%;

padding:16px;

border:none;

border-radius:16px;

font-size:16px;

font-weight:700;

cursor:pointer;

transition:.3s;

background:linear-gradient(135deg,#8b5cf6,#2563eb);

color:#fff;

box-shadow:0 10px 25px rgba(99,102,241,.45);

}

.btn-main:disabled{

background:#1e293b;

color:#64748b;

box-shadow:none;

cursor:not-allowed;

}

.footer{

margin-top:24px;

color:#94a3b8;

font-size:12px;

letter-spacing:1px;

}

</style>
